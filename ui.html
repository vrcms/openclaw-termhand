<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TermHand 管理界面</title>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #ccc; overflow: hidden; }
#sidebar { width: 240px; min-width: 160px; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; }
#sidebar h2 { padding: 12px 16px; font-size: 13px; text-transform: uppercase; color: #888; letter-spacing: 1px; border-bottom: 1px solid #333; }
#session-list { flex: 1; overflow-y: auto; }
.session-item { padding: 10px 16px; cursor: pointer; border-bottom: 1px solid #2d2d2d; transition: background .1s; }
.session-item:hover { background: #2a2d2e; }
.session-item.active { background: #094771; }
.session-id { font-size: 13px; font-weight: 600; color: #4ec9b0; }
.session-shell { font-size: 11px; color: #888; margin-top: 2px; }
.session-preview { font-size: 11px; color: #666; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { padding: 8px 16px; background: #2d2d2d; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; font-size: 12px; }
#current-session { color: #4ec9b0; font-weight: 600; }
#layout-btns button { padding: 3px 10px; background: #3c3c3c; border: 1px solid #555; color: #ccc; border-radius: 3px; cursor: pointer; font-size: 11px; }
#layout-btns button:hover { background: #094771; }
#terminal-area { flex: 1; display: flex; overflow: hidden; }
.term-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; overflow: hidden; }
.term-pane:last-child { border-right: none; }
.term-header { padding: 4px 12px; background: #252526; font-size: 11px; color: #888; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
.term-container { flex: 1; overflow: hidden; height: 100%; }
#status-bar { padding: 3px 16px; background: #007acc; font-size: 11px; color: #fff; display: flex; gap: 16px; transition: background .3s; }
#status-bar.disconnected { background: #5a1d1d; }
.status-item { opacity: .85; }
#no-session { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 14px; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>⚡ TermHand</h2>
  <div id="session-list"><div style="padding:16px;color:#555;font-size:12px">等待 bridge 连接...</div></div>
</div>
<div id="main">
  <div id="toolbar">
    <span>会话: <span id="current-session">-</span></span>
    <div id="layout-btns">
      <button onclick="setLayout(1)">1</button>
      <button onclick="setLayout(2)">1+1</button>
      <button onclick="setLayout(4)">2x2</button>
    </div>
    <button onclick="popout()" style="margin-left:auto;padding:3px 10px;background:#3c3c3c;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer;font-size:11px">⧉ 独立窗口</button>
  </div>
  <div id="terminal-area"><div id="no-session">请在左侧选择一个 session</div></div>
  <div id="status-bar" class="disconnected">
    <span class="status-item" id="s-connected">⚫ 未连接</span>
    <span class="status-item" id="s-sessions">0 个 session</span>
    <span class="status-item" id="s-time"></span>
  </div>
</div>

<script>
const terms = {}; // sessionId -> Terminal
const fitAddons = {};
let activeSession = null;
let sessions = [];
let layout = 1;
let ws;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ui-ws`);
  ws.onopen = () => {
    document.getElementById('s-connected').textContent = '🟢 已连接';
    document.getElementById('status-bar').classList.remove('disconnected');
  };
  ws.onclose = () => {
    document.getElementById('s-connected').textContent = '⚫ 未连接';
    document.getElementById('status-bar').classList.add('disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    if (msg.type === 'output') {
      const t = terms[msg.sessionId];
      if (t) t.write(msg.data);
      updatePreview(msg.sessionId, msg.data);
    } else if (msg.type === 'sessions') {
      updateSessions(msg.sessions);
    } else if (msg.type === 'session_closed') {
      removeSession(msg.sessionId);
    }
  };
}

function updateSessions(list) {
  sessions = list;
  document.getElementById('s-sessions').textContent = `${list.length} 个 session`;
  renderSidebar();
  // 初始化新 session 的 terminal
  list.forEach(s => {
    if (!terms[s.id]) initTerm(s.id);
  });
  // 自动选中唯一 session
  if (!activeSession && list.length === 1) selectSession(list[0].id);
}

function renderSidebar() {
  const el = document.getElementById('session-list');
  if (sessions.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:#555;font-size:12px">暂无活动 session</div>';
    return;
  }
  el.innerHTML = sessions.map(s => `
    <div class="session-item ${activeSession===s.id?'active':''}" onclick="selectSession('${s.id}')">
      <div class="session-id">${s.id}</div>
      <div class="session-shell">${s.shell}</div>
      <div class="session-preview" id="preview-${s.id}">${escHtml(s.lastOutput||'')}</div>
    </div>
  `).join('');
}

function updatePreview(sessionId, data) {
  const el = document.getElementById(`preview-${sessionId}`);
  if (!el) return;
  const clean = data.replace(/\x1b\[[\d;]*[mGKHF]/g,'').replace(/[\r\n]+/g,' ').trim();
  if (clean) el.textContent = clean.slice(-100);
}

function removeSession(sessionId) {
  sessions = sessions.filter(s => s.id !== sessionId);
  renderSidebar();
  if (activeSession === sessionId) {
    activeSession = sessions[0]?.id || null;
    renderTermArea();
  }
}

function selectSession(id) {
  activeSession = id;
  document.getElementById('current-session').textContent = id;
  renderSidebar();
  renderTermArea();
}

function initTerm(sessionId) {
  const t = new Terminal({
    theme: { background:'#1e1e1e', foreground:'#d4d4d4', cursor:'#aeafad' },
    fontSize: 14,
    fontFamily: "'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace",
    cursorBlink: true,
    cursorStyle: 'block',
    scrollback: 5000,
    bellStyle: 'none',
    allowProposedApi: true
  });
  const fit = new FitAddon.FitAddon();
  t.loadAddon(fit);
  terms[sessionId] = t;
  fitAddons[sessionId] = fit;
  // 阻止浏览器拦截 Tab、方向键等特殊键
  t.attachCustomKeyEventHandler((e) => {
    if (e.key === 'Tab') { e.preventDefault(); return true; }
    return true;
  });
}

function renderTermArea() {
  if (!activeSession) return;
  const area = document.getElementById('terminal-area');
  const panes = layout === 1 ? [activeSession] :
                layout === 2 ? sessions.slice(0,2).map(s=>s.id) :
                sessions.slice(0,4).map(s=>s.id);

  area.style.flexWrap = layout === 4 ? 'wrap' : 'nowrap';
  area.innerHTML = panes.map(sid => `
    <div class="term-pane" id="pane-${sid}" style="${layout===4?'width:50%;max-height:50%':''}">
      <div class="term-header"><span>${sid}</span><span style="cursor:pointer" onclick="popoutSession('${sid}')">⧉</span></div>
      <div class="term-container" id="tc-${sid}"></div>
    </div>
  `).join('');

  panes.forEach(sid => {
    const container = document.getElementById(`tc-${sid}`);
    if (!container) return;
    if (!terms[sid]) initTerm(sid);
    terms[sid].open(container);
    terms[sid].onData(data => sendInput(sid, data));
    // fit 撑满容器
    setTimeout(() => {
      if (fitAddons[sid]) fitAddons[sid].fit();
      terms[sid].scrollToBottom();
    }, 50);
  });

  // 窗口 resize 时重新 fit
  window.onresize = () => {
    panes.forEach(sid => {
      if (fitAddons[sid]) fitAddons[sid].fit();
    });
  };
}

function sendInput(sessionId, data) {
  // 不做本地 echo，PTY 会自动 echo，避免双显
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', sessionId, data }));
  }
}

function setLayout(n) {
  layout = n;
  renderTermArea();
}

function popout() {
  if (activeSession) popoutSession(activeSession);
}

function popoutSession(sessionId) {
  window.open(`${location.origin}/?session=${sessionId}`, '_blank',
    'width=900,height=600,menubar=no,toolbar=no,location=no');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 时钟
setInterval(() => {
  document.getElementById('s-time').textContent = new Date().toLocaleTimeString('zh');
}, 1000);

// 初始加载 sessions（WebSocket 为主，轮询为备用）
async function loadSessions() {
  try {
    const r = await fetch('/api/sessions');
    const list = await r.json();
    updateSessions(list);
  } catch(e) {}
}

connect();
loadSessions();
setInterval(loadSessions, 10000); // 降为10秒备用轮询
</script>
</body>
</html>
