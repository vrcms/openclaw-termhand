<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>TermHand 管理界面</title>
<script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.min.css">
<script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/css/layui.min.css">
<script src="https://cdn.jsdelivr.net/npm/layui@2.9.8/dist/layui.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { display: flex; height: 100vh; font-family: 'Segoe UI', sans-serif; background: #1e1e1e; color: #ccc; overflow: hidden; }
#sidebar { width: 240px; min-width: 160px; background: #252526; border-right: 1px solid #333; display: flex; flex-direction: column; }
#sidebar h2 { padding: 12px 16px; font-size: 13px; text-transform: uppercase; color: #888; letter-spacing: 1px; border-bottom: 1px solid #333; }
#session-list { flex: 1; overflow-y: auto; }
.session-group { border-bottom: 1px solid #2d2d2d; }
.session-group-header { padding: 6px 12px; font-size: 11px; color: #888; background: #1e1e1e; display: flex; align-items: center; gap: 6px; }
.session-group-cwd { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: monospace; }
.session-item { padding: 8px 16px 8px 24px; cursor: pointer; border-bottom: 1px solid #252526; transition: background .1s; }
.session-item:hover { background: #2a2d2e; }
.session-item.active { background: #094771; }
.session-id { font-size: 13px; font-weight: 600; color: #4ec9b0; }
.session-shell { font-size: 11px; color: #888; margin-top: 2px; }
#new-session-btn { margin: 8px 12px; padding: 5px 10px; background: #0e639c; border: none; color: #fff; border-radius: 3px; cursor: pointer; font-size: 11px; width: calc(100% - 24px); }
.session-preview { font-size: 11px; color: #666; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-family: monospace; }
#main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
#toolbar { padding: 8px 16px; background: #2d2d2d; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; font-size: 12px; }
#current-session { color: #4ec9b0; font-weight: 600; }
#layout-btns button { padding: 3px 10px; background: #3c3c3c; border: 1px solid #555; color: #ccc; border-radius: 3px; cursor: pointer; font-size: 11px; }
#layout-btns button:hover { background: #094771; }
#terminal-area { flex: 1; display: flex; overflow: hidden; }
.term-pane { flex: 1; display: flex; flex-direction: column; border-right: 1px solid #333; overflow: hidden; }
.term-pane:last-child { border-right: none; }
.term-header { padding: 4px 12px; background: #252526; font-size: 11px; color: #888; border-bottom: 1px solid #333; display: flex; justify-content: space-between; }
.term-container { flex: 1; overflow: hidden; height: 100%; }
#status-bar { padding: 3px 16px; background: #007acc; font-size: 11px; color: #fff; display: flex; gap: 16px; transition: background .3s; }
#status-bar.disconnected { background: #5a1d1d; }
.status-item { opacity: .85; }
#no-session { display: flex; align-items: center; justify-content: center; height: 100%; color: #555; font-size: 14px; }
</style>
</head>
<body>
<div id="sidebar">
  <h2>⚡ TermHand</h2>
  <div id="session-list"><div style="padding:16px;color:#555;font-size:12px">等待 bridge 连接...</div></div>
  <button id="new-session-btn" onclick="newSession()">＋ 新建 Session</button>
</div>
<div id="main">
  <div id="toolbar">
    <span>会话: <span id="current-session">-</span></span>
    <div id="layout-btns">
      <button onclick="setLayout(1)">1</button>
      <button onclick="setLayout(2)">1+1</button>
      <button onclick="setLayout(4)">2x2</button>
    </div>
    <button onclick="popout()" style="margin-left:auto;padding:3px 10px;background:#3c3c3c;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer;font-size:11px">⧉ 独立窗口</button>
  </div>
  <div id="terminal-area"><div id="no-session">请在左侧选择一个 session</div></div>
  <div id="status-bar" class="disconnected">
    <span class="status-item" id="s-connected">⚫ 未连接</span>
    <span class="status-item" id="s-sessions">0 个 session</span>
    <span class="status-item" id="s-time"></span>
  </div>
</div>

<script>
const terms = {}; // sessionId -> Terminal
const fitAddons = {};
let activeSession = null;
let sessions = [];
let layout = 1;
let ws;

function connect() {
  ws = new WebSocket(`ws://${location.host}/ui-ws`);
  ws.onopen = () => {
    document.getElementById('s-connected').textContent = '🟢 已连接';
    document.getElementById('status-bar').classList.remove('disconnected');
  };
  ws.onclose = () => {
    document.getElementById('s-connected').textContent = '⚫ 未连接';
    document.getElementById('status-bar').classList.add('disconnected');
    setTimeout(connect, 2000);
  };
  ws.onmessage = (e) => {
    const msg = JSON.parse(e.data);
    console.log('[WS] received:', msg.type, JSON.stringify(msg).slice(0,120));
    if (msg.type === 'output') {
      const t = terms[msg.sessionId];
      if (t) t.write(msg.data);
      updatePreview(msg.sessionId, msg.data);
    } else if (msg.type === 'sessions') {
      console.log('[WS] sessions update:', msg.sessions.length, 'sessions', msg.sessions.map(s=>s.id));
      updateSessions(msg.sessions);
    } else if (msg.type === 'session_closed') {
      removeSession(msg.sessionId);
    } else {
      console.log('[WS] unknown msg type:', msg.type);
    }
  };
  ws.onopen = () => console.log('[WS] connected');
  ws.onerror = (e) => console.error('[WS] error:', e);
  ws.onclose = (e) => console.warn('[WS] closed, code:', e.code);
}

function updateSessions(list) {
  console.log('[updateSessions] list:', list.map(s=>s.id+':'+(s.cwd||'?')));
  sessions = list;
  document.getElementById('s-sessions').textContent = `${list.length} 个 session`;
  renderSidebar();
  // 初始化新 session 的 terminal
  list.forEach(s => {
    if (!terms[s.id]) {
      console.log('[updateSessions] initTerm for', s.id);
      initTerm(s.id);
    }
  });
  // 自动选中唯一 session
  if (!activeSession && list.length === 1) {
    console.log('[updateSessions] auto-select', list[0].id);
    selectSession(list[0].id);
  }
}

function renderSidebar() {
  const el = document.getElementById('session-list');
  if (sessions.length === 0) {
    el.innerHTML = '<div style="padding:16px;color:#555;font-size:12px">暂无活动 session</div>';
    return;
  }
  // 按 cwd 分组
  const groups = {};
  sessions.forEach(s => {
    const key = s.cwd || '默认目录';
    if (!groups[key]) groups[key] = [];
    groups[key].push(s);
  });
  el.innerHTML = Object.entries(groups).map(([cwd, list]) => `
    <div class="session-group">
      <div class="session-group-header">
        <span>📁</span>
        <span class="session-group-cwd" title="${escHtml(cwd)}">${escHtml(cwd === '默认目录' ? cwd : (cwd.split(/[\\/]/).pop() || cwd))}</span>
        <span style="font-size:10px;opacity:.6" title="${escHtml(cwd)}">${list.length}</span>
      </div>
      ${list.map(s => `
        <div class="session-item ${activeSession===s.id?'active':''}" onclick="selectSession('${s.id}')">
          <div class="session-id">${escHtml(s.id)}</div>
          <div class="session-preview" id="preview-${s.id}">${escHtml(s.lastOutput||'')}</div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

// 目录树缓存
const dirCache = {};

async function browseDir(p) {
  // 规范化路径：确保盘符格式正确，如 d: → D:\
  if (/^[a-zA-Z]:$/.test(p.trim())) p = p.trim().toUpperCase() + '\\';
  if (dirCache[p]) return dirCache[p];
  try {
    const r = await fetch('/api/browse?path=' + encodeURIComponent(p));
    const d = await r.json();
    dirCache[p] = d.dirs || [];
    return dirCache[p];
  } catch { return []; }
}

async function doBrowse() {
  const input = document.getElementById('th-cwd-input');
  let p = (input && input.value.trim()) || 'C:\\';
  const dirs = await browseDir(p);
  const tree = document.getElementById('th-dir-tree');
  if (tree) renderDirTree(dirs, {}, tree);
}

function renderDirTree(dirs, selectedRef, container) {
  container.innerHTML = dirs.length === 0
    ? '<div style="color:#888;padding:8px">（空目录）</div>'
    : dirs.map(d => `
      <div class="dir-item" data-path="${escHtml(d.path)}" style="padding:5px 10px;cursor:pointer;border-radius:3px;display:flex;align-items:center;gap:6px">
        <span>📁</span><span style="font-size:13px">${escHtml(d.name)}</span>
      </div>
    `).join('');
  container.querySelectorAll('.dir-item').forEach(el => {
    el.addEventListener('click', async () => {
      container.querySelectorAll('.dir-item').forEach(x => x.style.background = '');
      el.style.background = '#094771';
      selectedRef.value = el.dataset.path;
      document.getElementById('th-cwd-input').value = el.dataset.path;
      // 展开子目录
      const sub = await browseDir(el.dataset.path);
      if (sub.length > 0) renderDirTree(sub, selectedRef, container);
    });
  });
}

async function doCreateSession() {
  const cwd = (document.getElementById('th-cwd-input').value || '').trim() || null;
  const cmd = (document.getElementById('th-cmd-input').value || '').trim();
  const id = 's' + (Date.now() % 100000);
  console.log('[CREATE] sessionId:', id, 'cwd:', cwd, 'cmd:', cmd);
  try {
    const r = await fetch('/api/new-session', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ sessionId: id, cwd })
    });
    const data = await r.json();
    console.log('[CREATE] /api/new-session response:', JSON.stringify(data));
    if (data.ok) {
      // 主动刷新 session 列表，不依赖 WS 推送
      const sr = await fetch('/api/sessions');
      const sd = await sr.json();
      console.log('[CREATE] /api/sessions response:', JSON.stringify(sd));
      const list = Array.isArray(sd) ? sd : (sd.sessions || []);
      updateSessions(list);
      // 自动切换到新 session
      setTimeout(() => { console.log('[CREATE] selectSession', id); selectSession(id); }, 200);
      // 创建后自动发送启动命令
      if (cmd) {
        setTimeout(() => {
          console.log('[CREATE] sending cmd via WS, readyState:', ws && ws.readyState);
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: 'input', sessionId: id, data: cmd + '\r' }));
          }
        }, 800);
      }
    } else {
      console.error('[CREATE] new-session failed:', data);
    }
  } catch (e) { console.error('[CREATE] error:', e); }
  layer.closeAll();
}

function newSession() {
  const selectedRef = { value: '' };
  layer.open({
    type: 1,
    title: '新建 Session',
    area: ['480px', '420px'],
    content: `
      <div style="padding:16px">
        <div style="margin-bottom:8px;font-size:12px;color:#888">工作目录</div>
        <div style="display:flex;gap:6px;margin-bottom:10px">
          <input id="th-cwd-input" type="text" placeholder="留空使用默认目录" style="flex:1;padding:6px 10px;background:#2d2d2d;border:1px solid #555;color:#ccc;border-radius:3px;font-size:13px">
          <button onclick="doBrowse()" style="padding:6px 12px;background:#0e639c;border:none;color:#fff;border-radius:3px;cursor:pointer">浏览</button>
        </div>
        <div style="margin-bottom:6px;display:flex;gap:4px;flex-wrap:wrap">
          <span style="font-size:11px;color:#888;align-self:center">快捷:</span>
          <button onclick="document.getElementById('th-cwd-input').value='C:\\\\';doBrowse()" style="padding:2px 8px;background:#3c3c3c;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer;font-size:11px">C:</button>
          <button onclick="document.getElementById('th-cwd-input').value='D:\\\\';doBrowse()" style="padding:2px 8px;background:#3c3c3c;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer;font-size:11px">D:</button>
          <button onclick="document.getElementById('th-cwd-input').value='E:\\\\';doBrowse()" style="padding:2px 8px;background:#3c3c3c;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer;font-size:11px">E:</button>
          <button onclick="document.getElementById('th-cwd-input').value='/';doBrowse()" style="padding:2px 8px;background:#3c3c3c;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer;font-size:11px">/</button>
        </div>
        <div id="th-dir-tree" style="height:150px;overflow-y:auto;background:#1e1e1e;border:1px solid #333;border-radius:3px;padding:4px"></div>
        <div style="margin-top:10px">
          <div style="margin-bottom:4px;font-size:12px;color:#888">启动命令（可选，留空只打开 shell）</div>
          <input id="th-cmd-input" type="text" placeholder="例如: npm run dev" style="width:100%;padding:6px 10px;background:#2d2d2d;border:1px solid #555;color:#ccc;border-radius:3px;font-size:13px">
        </div>
        <div style="margin-top:10px;display:flex;gap:8px;justify-content:flex-end">
          <button onclick="layer.closeAll()" style="padding:6px 16px;background:#3c3c3c;border:1px solid #555;color:#ccc;border-radius:3px;cursor:pointer">取消</button>
          <button onclick="doCreateSession()" style="padding:6px 16px;background:#0e639c;border:none;color:#fff;border-radius:3px;cursor:pointer">创建</button>
        </div>
      </div>
    `,
    success: async () => {
      // 默认加载根目录
      const root = navigator.platform.includes('Win') ? 'C:\\' : '/';
      const dirs = await browseDir(root);
      renderDirTree(dirs, selectedRef, document.getElementById('th-dir-tree'));
    }
  });
}

function updatePreview(sessionId, data) {
  const el = document.getElementById(`preview-${sessionId}`);
  if (!el) return;
  const clean = data.replace(/\x1b\[[\d;]*[mGKHF]/g,'').replace(/[\r\n]+/g,' ').trim();
  if (clean) el.textContent = clean.slice(-100);
}

function removeSession(sessionId) {
  sessions = sessions.filter(s => s.id !== sessionId);
  renderSidebar();
  if (activeSession === sessionId) {
    activeSession = sessions[0]?.id || null;
    renderTermArea();
  }
}

function selectSession(id) {
  activeSession = id;
  document.getElementById('current-session').textContent = id;
  renderSidebar();
  renderTermArea();
}

function initTerm(sessionId) {
  const t = new Terminal({
    theme: { background:'#1e1e1e', foreground:'#d4d4d4', cursor:'#aeafad' },
    fontSize: 14,
    fontFamily: "'Cascadia Code', 'Fira Code', Consolas, 'Courier New', monospace",
    cursorBlink: true,
    cursorStyle: 'block',
    scrollback: 5000,
    bellStyle: 'none',
    allowProposedApi: true
  });
  const fit = new FitAddon.FitAddon();
  t.loadAddon(fit);
  terms[sessionId] = t;
  fitAddons[sessionId] = fit;
  // 阻止浏览器拦截 Tab、方向键等特殊键
  t.attachCustomKeyEventHandler((e) => {
    if (e.key === 'Tab') { e.preventDefault(); return true; }
    return true;
  });
}

function renderTermArea() {
  if (!activeSession) return;
  const area = document.getElementById('terminal-area');
  const panes = layout === 1 ? [activeSession] :
                layout === 2 ? sessions.slice(0,2).map(s=>s.id) :
                sessions.slice(0,4).map(s=>s.id);

  area.style.flexWrap = layout === 4 ? 'wrap' : 'nowrap';
  area.innerHTML = panes.map(sid => `
    <div class="term-pane" id="pane-${sid}" style="${layout===4?'width:50%;max-height:50%':''}">
      <div class="term-header"><span>${sid}</span><span style="cursor:pointer" onclick="popoutSession('${sid}')">⧉</span></div>
      <div class="term-container" id="tc-${sid}"></div>
    </div>
  `).join('');

  panes.forEach(sid => {
    const container = document.getElementById(`tc-${sid}`);
    if (!container) return;
    if (!terms[sid]) initTerm(sid);
    terms[sid].open(container);
    terms[sid].onData(data => sendInput(sid, data));
    // fit 撑满容器
    setTimeout(() => {
      if (fitAddons[sid]) fitAddons[sid].fit();
      terms[sid].scrollToBottom();
    }, 50);
  });

  // 窗口 resize 时重新 fit
  window.onresize = () => {
    panes.forEach(sid => {
      if (fitAddons[sid]) fitAddons[sid].fit();
    });
  };
}

function sendInput(sessionId, data) {
  // cmd.exe 管道模式不会 echo，需要本地 echo
  if (terms[sessionId]) terms[sessionId].write(data);
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ type: 'input', sessionId, data }));
  }
}

function setLayout(n) {
  layout = n;
  renderTermArea();
}

function popout() {
  if (activeSession) popoutSession(activeSession);
}

function popoutSession(sessionId) {
  window.open(`${location.origin}/?session=${sessionId}`, '_blank',
    'width=900,height=600,menubar=no,toolbar=no,location=no');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// 时钟
setInterval(() => {
  document.getElementById('s-time').textContent = new Date().toLocaleTimeString('zh');
}, 1000);

// 初始加载 sessions（WebSocket 为主，轮询为备用）
async function loadSessions() {
  try {
    const r = await fetch('/api/sessions');
    const list = await r.json();
    updateSessions(list);
  } catch(e) {}
}

connect();
loadSessions();
setInterval(loadSessions, 10000); // 降为10秒备用轮询
</script>
</body>
</html>
